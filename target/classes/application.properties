# ==============================
# APP CONFIG
# ==============================
spring.application.name=quantity-measurement-app

# ==============================
# SERVER
# ==============================
server.port=${PORT:8080}

# ==============================
# DATABASE (Railway)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quantity_measurement_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:AnushkaSinghal24}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==============================
# SWAGGER
# ==============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

## GOOGLE OAUTH
spring.security.oauth2.client.registration.google.client-id=CLIENT_ID;
spring.security.oauth2.client.registration.google.client-secret=CLIENT_SECRET;

spring.security.oauth2.client.registration.google.scope=email,profile