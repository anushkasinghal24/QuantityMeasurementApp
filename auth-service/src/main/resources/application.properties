spring.application.name=auth-service

server.port=${PORT:8082}

# DATABASE (FIXED)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:authdb;MODE=MySQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${MYSQLUSER:sa}
spring.datasource.password=${MYSQLPASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# EUREKA
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:false}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:false}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true


# OAUTH
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:DUMMY_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:DUMMY_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${AUTH_SERVICE_URL:http://localhost:8082}/login/oauth2/code/google

frontend.url=${FRONTEND_URL:http://localhost:4200}

# SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
